[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Clean URL for the admin endpoint:
# Client calls /api/add-resource, Netlify routes to /.netlify/functions/add-resource
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
